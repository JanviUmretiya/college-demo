<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>મારું ટુ-ડુ લિસ્ટ (To-Do List)</title>
    <style>
        /* CSS ફોર ડિઝાઇન */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .todo-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #2ecc71;
        }

        button {
            padding: 10px 15px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #27ae60;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            padding: 12px;
            background-color: #f9f9f9;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 5px;
            margin-bottom: 8px;
            transition: transform 0.2s;
        }

        li:hover {
            transform: scale(1.02);
        }

        .delete-btn {
            background-color: #e74c3c;
            padding: 5px 10px;
            font-size: 12px;
        }

        .delete-btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <div class="todo-container">
        <h2>મારું ટુ-ડુ લિસ્ટ</h2>
        
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="નવું કાર્ય ઉમેરો...">
            <button onclick="addTask()">ઉમેરો</button>
        </div>

        <ul id="taskList">
            </ul>
    </div>

    <script>
        // JavaScript ફોર ફંક્શનાલિટી
        function addTask() {
            const taskInput = document.getElementById('taskInput');
            const taskText = taskInput.value.trim();

            if (taskText === '') {
                alert('કૃપા કરીને કંઈક લખો!');
                return;
            }

            const taskList = document.getElementById('taskList');

            // નવું લિસ્ટ આઇટમ (li) બનાવવું
            const li = document.createElement('li');
            li.innerHTML = `
                <span>${taskText}</span>
                <button class="delete-btn" onclick="deleteTask(this)">ડીલીટ</button>
            `;

            // લિસ્ટમાં ઉમેરવું
            taskList.appendChild(li);

            // ઇનપુટ બોક્સ ખાલી કરવું
            taskInput.value = '';
        }

        function deleteTask(button) {
            // કાર્યને લિસ્ટમાંથી હટાવવું
            const li = button.parentElement;
            li.remove();
        }
    </script>

</body>
</html>
